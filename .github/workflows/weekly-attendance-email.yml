name: Weekly attendance email

on:
  schedule:
    # GitHub cron is UTC. Wed 02:00–04:00 UTC covers Tue 22:00 in US Eastern (EST/EDT).
    - cron: '0 2,3,4 * * 3'
  workflow_dispatch:
    inputs:
      force_send:
        description: Send immediately (skip Tuesday 10 PM gate)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_PROJECT_ID: tn170-attendance
      SCHEDULE_TIMEZONE: America/New_York
      MEETING_DAY: Tuesday
      SEND_HOUR: '22'
      FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_send || 'false' }}
      EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send weekly attendance email
        run: npm run email:weekly
