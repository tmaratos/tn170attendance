name: System force checkout

on:
  schedule:
    # GitHub cron is UTC. Wed 01:30–03:30 UTC covers Tue 21:30 in US Eastern (EST/EDT).
    - cron: '30 1,2,3 * * 3'
  workflow_dispatch:
    inputs:
      force_run:
        description: Run immediately (skip Tuesday 9:30 PM gate)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  force-checkout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_PROJECT_ID: tn170-attendance
      SCHEDULE_TIMEZONE: America/New_York
      MEETING_DAY: Tuesday
      FORCE_HOUR: '21'
      FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run || 'false' }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: System force checkout
        run: npm run force:checkout
